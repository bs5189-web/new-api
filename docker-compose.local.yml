services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: new-api:patched
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - LOG_REQUEST_TOOLS=true
      - LOG_TOOL_FILTER_REGEX=^skill_