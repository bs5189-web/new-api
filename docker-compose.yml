# New-API Docker Compose Configuration
#
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# Uses local (host) PostgreSQL and Redis services via host.docker.internal.

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - /tmp/new-api:/new-api
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://learnhouse:learnhouse@host.docker.internal:5432/learnhouse?sslmode=disable
      - REDIS_CONN_STRING=redis://host.docker.internal:6379
      - TZ=Asia/Shanghai
      - HTTP_PROXY=http://192.168.65.254:7891
      - HTTPS_PROXY=http://192.168.65.254:7891
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1
      - LOG_REQUEST_TOOLS=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  new-api-network:
    driver: bridge
